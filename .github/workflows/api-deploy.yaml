name: Build and deploy BookValut API

on:
  push:
    branches: [main]

# Workflow of the pipeline
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.vars.outputs.sha }}

    steps:
      - name: Checkout repository
        id: github
        uses: actions/checkout@v3

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x
      
      - name: Configure Azure ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ vars.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: SHA of the commit
        id: vars
        run: |
          calculatedSha=$(git rev-parse --short ${GITHUB_SHA})
          echo "sha=$calculatedSha" >> $GITHUB_OUTPUT


      # - name: Print SHA
      #   run: echo "SHA is ${{ steps.vars.outputs.sha }}"

      - name: Build and push Docker image to ACR
        env:
          ACR_REGISTRY: ${{ vars.ACR_SERVER }}
          IMAGE_NAME: bookvaultapi
          IMAGE_TAG: ${{ steps.vars.outputs.sha }}
        run: |
          docker build -f docker/api/Dockerfile -t $ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG  -t $ACR_REGISTRY/$IMAGE_NAME:latest .
          docker push $ACR_REGISTRY/$IMAGE_NAME --all-tags


  deploy-container-to-ACS:
    needs: build-and-deploy
    runs-on: ubuntu-latest

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: build and deploy to Azure Container Service
        uses: azure/container-apps-deploy-action@v1
        env:
          IMAGE_NAME: bookvaultapi
          IMAGE_TAG: ${{ needs.build-and-deploy.outputs.sha }}
          ACR_SERVER: ${{ vars.ACR_SERVER }}
        with:
          registryUrl: ${{ vars.ACR_SERVER }}
          imageToDeploy: $Acr_SERVER/$IMAGE_NAME:$IMAGE_TAG
          targetPort: 8080
          ingress: 'external'
          containerAppName: 'bookvaultappdev'
          containerAppEnvironment: 'bookvaultappenvdev'
          resourceGroup: 'bookvault-rg'
          environmentVariables: |
            ASPNETCORE_ENVIRONMENT=Development ASPNETCORE_URLS=http://+:8080




      