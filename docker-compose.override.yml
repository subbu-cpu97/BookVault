# docker-compose.override.yml
# Automatically merged with docker-compose.yml in local dev
# Never committed to production — dev-only extras
# Interview answer: "What is the override pattern in Docker Compose?"
# Base file has what all environments share.
# Override file has what only local dev needs.
# CI/CD uses: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:

  api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Logging__LogLevel__Default=Debug
      - Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command=Information
    volumes:
      # Mount source code for watch mode (hot reload in containers)
      - ./src:/app/src

  # ─────────────────────────────────────────
  # pgAdmin — visual database browser
  # Access at http://localhost:5050
  # Login: admin@bookvault.com / admin
  # Add server: host=postgres, port=5432, user=bookvault, pass=bookvault_pass
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bookvault-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bookvault.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"   # single-user mode — no login needed
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json  # auto-configure connection
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookvault-network

volumes:
  pgadmin_data:
    driver: local